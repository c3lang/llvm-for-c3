name: Build

on:
  push:
    branches: [ main ]
    tags: [ 'llvm_*' ]
    paths-ignore:
      - README.md
      - LICENSE
  workflow_dispatch:

env:
  LLVM_VERSION: "main"
  LLVM_REPO_URL: "https://github.com/llvm/llvm-project.git"

jobs:
  build:
    name: Build (${{ matrix.target.id }}, ${{ matrix.llvm_version }}, ${{ matrix.llvm_build_type }})
    strategy:
      fail-fast: false
      matrix:
        llvm_version: ["main"]
        llvm_build_type: ["Release", "Debug"]
        target:
          - id: "linux-amd64"
            os: "ubuntu-22.04"

          - id: "linux-aarch64"
            os: "ubuntu-24.04-arm"

          - id: "linux-riscv64"
            os: "ubuntu-24.04"

          - id: "linux-amd64-musl"
            os: "ubuntu-latest"
            container: "alpine:3.23"

          - id: "darwin-amd64"
            os: "macos-15-intel"

          - id: "darwin-aarch64"
            os: "macos-latest"

          - id: "windows-amd64"
            os: "windows-2022"
            tar_extra_args: "--dereference" # On Windows, symlinks require existing targets, so archives may fail. Dereferencing stores copies instead, slightly increasing size but ensuring reliable unpacking.

    runs-on: ${{ matrix.target.os }}
    container: ${{ matrix.target.container }}

    steps:
      - name: Check out the code
        uses: actions/checkout@v6

      - name: Install dependencies (musl)
        if: matrix.target.id == 'linux-amd64-musl'
        run: |
          apk add --no-cache \
            build-base bash git cmake ninja python3 linux-headers \
            zlib-dev zlib-static zstd-dev zstd-static curl-dev libffi-dev xz

      - name: Free Disk Space (Linux glibc only)
        if: startsWith(matrix.target.id, 'linux-') && matrix.target.id != 'linux-amd64-musl'
        run: |
          sudo docker system prune --all --force --volumes || true
          sudo rm -rf \
            /usr/share/dotnet \
            /usr/local/lib/android \
            /opt/android \
            /opt/ghc \
            /usr/local/.ghcup \
            /home/runner/.ghcup \
            /home/runner/.cabal \
            /usr/share/swift \
            /usr/share/miniconda \
            /usr/local/julia \
            /usr/share/az* \
            /usr/local/aws-cli \
            /usr/local/aws-sam-cli \
            /usr/local/share/powershell \
            /usr/local/share/chromium \
            /usr/local/lib/node_modules \
            /usr/share/gradle \
            "${AGENT_TOOLSDIRECTORY:-/opt/hostedtoolcache}"

      - name: Maximize Swap Space (glibc only)
        if: startsWith(matrix.target.id, 'linux-') && matrix.target.id != 'linux-amd64-musl'
        uses: pierotofy/set-swap-space@master
        with:
          swap-size-gb: 5

      - name: Install ninja (Linux glibc)
        if: startsWith(matrix.target.id, 'linux-') && matrix.target.id != 'linux-amd64-musl'
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build zlib1g-dev libzstd-dev

      - name: Install cross-compilation tools (RISCV)
        if: matrix.target.id == 'linux-riscv64'
        run: |
          sudo dpkg --add-architecture riscv64
          find /etc/apt/ -type f -name "*.list" -o -name "sources.list" | xargs -r grep -l "^deb " | xargs -r sudo sed -i -E "s/^deb\s+([^\[])/deb [arch=$(dpkg --print-architecture)] \1/"
          find /etc/apt/sources.list.d/ -type f -name "*.sources" | xargs -r sudo sed -i "/^Types: deb/a Architectures: $(dpkg --print-architecture)"

          # Add the RISC-V ports mirror
          echo "deb [arch=riscv64] http://ports.ubuntu.com/ubuntu-ports noble main universe restricted multiverse" | sudo tee /etc/apt/sources.list.d/riscv64.list
          echo "deb [arch=riscv64] http://ports.ubuntu.com/ubuntu-ports noble-updates main universe restricted multiverse" | sudo tee -a /etc/apt/sources.list.d/riscv64.list
          echo "deb [arch=riscv64] http://ports.ubuntu.com/ubuntu-ports noble-security main universe restricted multiverse" | sudo tee -a /etc/apt/sources.list.d/riscv64.list

          sudo apt-get update
          sudo apt-get install -y \
            gcc-13-riscv64-linux-gnu g++-13-riscv64-linux-gnu \
            gcc-13-multilib binutils-riscv64-linux-gnu \
            libgcc-13-dev-riscv64-cross libstdc++6-riscv64-cross \
            zlib1g-dev:riscv64 libzstd-dev:riscv64

      - name: Install ninja (macOS)
        if: startsWith(matrix.target.id, 'darwin-')
        run: command -v ninja >/dev/null || brew install ninja

      - name: Setup MSVC (Windows)
        uses: ilammy/msvc-dev-cmd@v1
        if: matrix.target.id == 'windows-amd64'

      - name: Build
        shell: bash
        run: |
          ./build.sh \
            ${{ matrix.llvm_version }} \
            ${{ env.LLVM_REPO_URL }} \
            ${{ matrix.target.id }} \
            ${{ matrix.llvm_build_type }}

      - name: Package
        shell: bash
        run: |
          ./package.sh "${{ matrix.llvm_build_type }}" "tar.gz" "${{ matrix.target.tar_extra_args }}"
          ./package.sh "${{ matrix.llvm_build_type }}" "tar.xz" "${{ matrix.target.tar_extra_args }}"

      - name: Upload Artifacts
        uses: actions/upload-artifact@v6
        with:
          name: ${{ matrix.target.id }}__${{ matrix.llvm_version }}__${{ matrix.llvm_build_type }}
          path: dist
          if-no-files-found: error
          retention-days: 1

  release:
    name: Release
    runs-on: ubuntu-latest
    needs: [build]
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Download the Artifacts
        uses: actions/download-artifact@v7
        with:
          path: artifacts

      - name: Prepare Release Assets
        shell: bash
        run: |
          mkdir -p release_dist
          for dir in artifacts/*; do
            dirname=$(basename "$dir")
            # Parse the directory name: <ID>__<VERSION>__<TYPE>
            type=${dirname##*__}
            remainder=${dirname%__*}
            version=${remainder##*__}
            id=${remainder%__*}
            suffix=""
            if [ "$type" = "Debug" ]; then
              suffix="-dbg"
            fi
            for FILE in "$dir"/*.tar.*; do
              if [ -f "$FILE" ]; then
                ext="${FILE##*.tar.}"
                cp "$FILE" "release_dist/llvm-${id}${suffix}.tar.${ext}"
              fi
            done
          done

      - name: Create and Upload Release
        uses: softprops/action-gh-release@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          name: LLVM ${{ env.LLVM_VERSION }}
          tag_name: ${{ github.ref_name }}
          files: release_dist/*.tar.*
          draft: true
          prerelease: true
